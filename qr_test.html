<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      background: #f7f7f7;
    }
    h2 {
      margin-top: 0;
    }
    #reader {
      width: 100%;
      max-width: 420px;
      background: #fff;
      margin-bottom: 16px;
    }
    .box {
      background: #fff;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .ok {
      color: green;
      font-weight: bold;
    }
    .warn {
      color: #b36b00;
      font-weight: bold;
    }
    button {
      font-size: 16px;
      padding: 10px 16px;
      margin: 4px;
    }
  </style>
</head>
<body>
  <h2>QR読み取り実験</h2>

  <div class="box">
    <div>保持中の道場ID：</div>
    <div id="locationId" class="warn">未設定</div>
  </div>

  <div id="reader"></div>

  <div class="box">
    <button onclick="startScan()">読み取り開始</button>
    <button onclick="stopScan()">停止</button>
    <button onclick="clearLog()">ログ消去</button>
  </div>

  <div class="box">
    <div>最新読み取り：</div>
    <div id="latest">なし</div>
  </div>

  <div class="box">
    <div>読み取りログ：</div>
    <ul id="log"></ul>
  </div>

  <script>
    let html5QrCode;
    let scanning = false;
    let currentLocationId = "";
    let lastText = "";
    let lastReadTime = 0;

    function startScan() {
      if (scanning) return;

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      };

      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanFailure
      ).then(() => {
        scanning = true;
        addLog("カメラ起動成功");
      }).catch(err => {
        addLog("カメラ起動エラー: " + err);
      });
    }

    function stopScan() {
      if (!html5QrCode || !scanning) return;

      html5QrCode.stop().then(() => {
        scanning = false;
        addLog("読み取り停止");
      }).catch(err => {
        addLog("停止エラー: " + err);
      });
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();

      // 同じQRの連続検出を抑止
      if (decodedText === lastText && now - lastReadTime < 2000) {
        return;
      }

      lastText = decodedText;
      lastReadTime = now;

      document.getElementById("latest").textContent = decodedText;

      const parsed = parseQrText(decodedText);

      if (parsed.location_id) {
        currentLocationId = parsed.location_id;
        document.getElementById("locationId").textContent = currentLocationId;
        document.getElementById("locationId").className = "ok";
        addLog("道場QR読取: " + currentLocationId);
        return;
      }

      if (parsed.member_id) {
        addLog("会員QR読取: " + parsed.member_id + " / location=" + (currentLocationId || "未設定"));
        return;
      }

      addLog("未分類QR: " + decodedText);
    }

    function onScanFailure(error) {
      // 毎フレーム失敗ログが出るので、ここでは何もしない
    }

    function parseQrText(text) {
      const result = {};

      try {
        const url = new URL(text);
        result.location_id = url.searchParams.get("location_id") || "";
        result.member_id = url.searchParams.get("member_id") || "";
        return result;
      } catch (e) {
        // URLでない場合も許容
      }

      if (text.startsWith("location_id=")) {
        result.location_id = text.replace("location_id=", "").trim();
      }

      if (text.startsWith("member_id=")) {
        result.member_id = text.replace("member_id=", "").trim();
      }

      return result;
    }

    function addLog(message) {
      const li = document.createElement("li");
      const time = new Date().toLocaleTimeString();
      li.textContent = "[" + time + "] " + message;
      document.getElementById("log").prepend(li);
    }

    function clearLog() {
      document.getElementById("log").innerHTML = "";
      document.getElementById("latest").textContent = "なし";
      lastText = "";
      lastReadTime = 0;
    }
  </script>
</body>
</html>
