<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>先生ホーム</title><link rel="stylesheet" href="common.css"></head>
<body class="teacher">
  <h1>🥋 先生ホーム</h1>
  <section class="card login-state"><strong id="loginIdentity">未ログイン</strong><button onclick="logoutSession()">ログアウト</button></section>
  <section class="card">
    <h2>先生メニュー</h2>
    <div class="grid">
      <a class="button teacher-link" href="payment_teacher.html">💴 会費受付</a>
      <a class="button teacher-link" href="#">👥 会員検索（準備中）</a>
      <a class="button teacher-link" href="attendanceCheck.html">📅 本日の出席（仮ページ）</a>
      <a class="button teacher-link" href="payment_status.html">💰 会費状況</a>
      <a class="button teacher-link" href="paymentEvidence.html">📲 決済コード確認（仮ページ）</a>
      <a class="button teacher-link" href="#">📊 月次処理（準備中）</a>
      <a class="button teacher-link" href="#">📢 お知らせ（準備中）</a>
    </div>
  </section>
  <p class="note"><a href="index.html">入口へ戻る</a></p>
  <script src="virtual_session.js"></script>
  <script>
    const queryTeacherId = new URLSearchParams(location.search).get("teacher_id") || "";
    if (queryTeacherId) DojoVirtualSession.loginTeacher(queryTeacherId, "PAGE_URL");
    const teacherSession = DojoVirtualSession.get();
    if (teacherSession && teacherSession.role === "TEACHER") {
      document.getElementById("loginIdentity").textContent = "先生 " + teacherSession.teacher_id + " でログイン中";
    }
    function logoutSession() {
      DojoVirtualSession.logout();
      location.href = "index.html";
    }
  </script>
  <script src="system_context.js"></script>
</body></html>
