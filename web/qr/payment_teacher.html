<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合気道 先生ページ - 会費受付</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
      background: #FFF8E1;
    }
    h1 {
      font-size: 22px;
      margin-top: 0;
    }
    .card {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 12px auto;
      background: #fff;
    }
    button {
      font-size: 16px;
      padding: 10px 14px;
      margin: 4px;
      border-radius: 8px;
      border: 1px solid #999;
      background: #fff;
    }
    button.primary {
      font-size: 18px;
      font-weight: bold;
      min-width: 140px;
    }
    button.danger {
      color: #b00020;
    }
    .ok {
      color: green;
      font-weight: bold;
    }
    .warn {
      color: #c47a00;
      font-weight: bold;
    }
    .latest {
      font-size: 18px;
      font-weight: bold;
      word-break: break-all;
    }
    .current-name {
      font-size: 22px;
      font-weight: bold;
      margin: 8px 0;
    }
    .amount {
      font-size: 26px;
      font-weight: bold;
      margin: 8px 0;
    }
    .summary {
      font-size: 18px;
      line-height: 1.8;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin-bottom: 6px;
    }

    .payment-row {
      display: flex;
      gap: 8px;

      white-space: nowrap;
      overflow: hidden;

      padding: 4px 0;
      border-bottom: 1px solid #eee;

      font-size: 14px;
    }

    .payment-name {
      flex: 1;
      font-weight: bold;
    }

    .payment-amount {
      width: 80px;
      text-align: right;
    }

    .payment-type {
      width: 70px;
      text-align: center;
    }

    #paymentList {
      max-height: 250px;
      overflow-y: auto;
    }    

    .evidence-row {
      display: grid;
      grid-template-columns: 28px 1fr 90px;
      gap: 8px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .evidence-main {
      min-width: 0;
    }
    .evidence-title {
      font-weight: bold;
      word-break: break-word;
    }
    .evidence-sub {
      color: #555;
      font-size: 12px;
      word-break: break-word;
    }
    .evidence-amount {
      text-align: right;
      font-weight: bold;
      white-space: nowrap;
    }
    .mini-summary {
      margin: 6px 0;
      font-size: 14px;
      color: #333;
    }

    .role-badge {
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:#d8ecff;
      color:#0b5cad;
      font-size:12px;
      font-weight:bold;
      margin-bottom:8px;
    }
    .top-nav { margin:0 0 12px; }
    .top-nav a {
      display:inline-block;
      margin:0 6px 6px 0;
      padding:7px 10px;
      border-radius:8px;
      border:1px solid #b5d4f0;
      background:#fff;
      color:#0b5cad;
      text-decoration:none;
      font-size:14px;
    }

  </style>
</head>

<body>
  <div class="role-badge">先生画面</div>
  <h1>合気道 会費受付</h1>
  <nav class="top-nav"><a href="teacher_home.html">先生ホーム</a><a href="index.html">入口</a></nav>

  <div class="card">
    <div>保持中の道場ID</div>
    <div id="locationId" class="warn">未設定</div>
  </div>

  <div class="card">
    <div>保持中の先生ID</div>
    <div id="teacherId" class="warn">未設定</div>
  </div>

  <div class="card">
    <div id="reader"></div>

    <button onclick="startScan()">読み取り開始</button>
    <button onclick="stopScan()">停止</button>
    <button onclick="resetScreen()">画面クリア</button>
  </div>

  <div class="card">
    <div>現在受付中</div>
    <div id="currentPayment">会員、プランQRを読んでください</div>
  </div>

  <div class="card">
    <div>受付済</div>
    <ul id="paymentList"></ul>
  </div>

  <div class="card summary">
    <div>現金: <span id="cashTotal">0</span>円</div>
    <div>PayPay: <span id="paypayTotal">0</span>円</div>
    <div>合計: <span id="grandTotal">0</span>円</div>
    <div>受付人数: <span id="paymentCount">0</span>名</div>
    <button onclick="sendPaymentsToGas()">集金完了</button>
    <button onclick="postConfirmedPayments()">決済更新</button>
  </div>

  <div class="card">
    <div>決済更新待ち（CONFIRMED）</div>
    <div class="mini-summary">件数: <span id="confirmedEvidenceCount">0</span>件 / 合計: <span id="confirmedEvidenceTotal">0</span>円</div>
    <button onclick="loadPaymentEvidenceLists()">決済情報取得</button>
    <button onclick="selectAllConfirmedEvidences(true)">全選択</button>
    <button onclick="selectAllConfirmedEvidences(false)">全解除</button>
    <button class="primary" onclick="postSelectedConfirmedEvidences()">選択分を決済更新</button>
    <ul id="confirmedEvidenceList"></ul>
  </div>

  <div class="card">
    <div>反映済み（POSTED）</div>
    <div class="mini-summary">件数: <span id="postedEvidenceCount">0</span>件 / 合計: <span id="postedEvidenceTotal">0</span>円</div>
    <ul id="postedEvidenceList"></ul>
  </div>

  <div class="card">
    <div>最新読み取りURL</div>
    <div id="latest" class="latest">なし</div>
  </div>

  <div class="card">
    <div>操作ログ</div>
    <ul id="log"></ul>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_Movz5VBZkf8qHdMkR7kkQRkLkYJAbahN5OPStFT8YXnhCuIGJBCdqjy2PwgWaorUfA/exec";

    let html5QrCode = null;
    let scanning = false;

    let currentLocationId = "";
    let currentTeacherId = "";
    let lastText = "";
    let lastReadTime = 0;

    let currentPayment = null;
    let paymentList = [];
    let confirmedEvidences = [];
    let postedEvidences = [];

    function startScan() {
      if (scanning) return;

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      };

      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanFailure
      ).then(() => {
        scanning = true;
        addLog("カメラ起動成功");
      }).catch(err => {
        addLog("カメラ起動エラー: " + err);
      });
    }

    function stopScan() {
      if (!html5QrCode || !scanning) return;

      html5QrCode.stop().then(() => {
        scanning = false;
        addLog("読み取り停止");
      }).catch(err => {
        addLog("停止エラー: " + err);
      });
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();

      if (decodedText === lastText && now - lastReadTime < 2000) {
        return;
      }

      lastText = decodedText;
      lastReadTime = now;

      document.getElementById("latest").textContent = decodedText;

      const parsed = parseQrText(decodedText);

      if (parsed.location_id) {
        currentLocationId = parsed.location_id;
        document.getElementById("locationId").textContent = currentLocationId;
        document.getElementById("locationId").className = "ok";
        addLog("道場QR読取: " + currentLocationId);
        beep();
        return;
      }

      if (parsed.teacher_id) {
        currentTeacherId = parsed.teacher_id;
        document.getElementById("teacherId").textContent = currentTeacherId;
        document.getElementById("teacherId").className = "ok";
        addLog("先生QR読取: " + currentTeacherId);
        beep();
        return;
      }

      if (parsed.member_id && parsed.plan_id) {
        addLog("会員・プランQR読取: " + parsed.member_id + "(" + parsed.plan_id + ")");
        beep();
        loadMemberForPayment(parsed.member_id, parsed.plan_id);
        return;
      }

      if (parsed.member_id) {
        addLog("会員QR読取: " + parsed.member_id);
        beep();
        loadMemberForPayment(parsed.member_id);
        return;
      }

      addLog("未分類QR: " + decodedText);
      beep();
    }

    function onScanFailure(error) {
      // 毎フレーム失敗するのでログ出力しない
    }

    function parseQrText(text) {
      const result = {
        location_id: "",
        teacher_id: "",
        member_id: "",
        plan_id: ""
      };

      try {
        const url = new URL(text);
        result.location_id = url.searchParams.get("location_id") || "";
        result.member_id = url.searchParams.get("member_id") || "";
        result.teacher_id = url.searchParams.get("teacher_id") || "";
        result.plan_id = url.searchParams.get("plan_id") || "";
        return result;
      } catch (e) {
        // URLでない場合は下へ
      }

      if (text.startsWith("teacher_id=")) {
        result.teacher_id = text.replace("teacher_id=", "").trim();
      }

      if (text.startsWith("location_id=")) {
        result.location_id = text.replace("location_id=", "").trim();
      }

      if (text.startsWith("member_id=")) {
        result.member_id = text.replace("member_id=", "").trim();
      }

      if (text.startsWith("plan_id=")) {
        result.plan_id = text.replace("plan_id=", "").trim();
      }

      return result;
    }

    function renderCurrentPayment() {
      const div = document.getElementById("currentPayment");

      if (!currentPayment) {
        div.textContent = "会員QR、プランQRを読んでください";
        return;
      }

      div.innerHTML = `
        <div class="current-name">${escapeHtml(currentPayment.memberName)}</div>
        <div>${escapeHtml(currentPayment.targetMonth)}／${escapeHtml(currentPayment.feeType)}</div>
        <div>請求グループ: ${escapeHtml(currentPayment.billingGroupId || "未設定")}</div>
        <div>プランID: ${escapeHtml(currentPayment.planId || "未設定")}</div>
        <div class="amount">${formatYen(currentPayment.amount)}円</div>
         ${currentPayment.amount > 0
            ? `
              <!--
                現金受付
                ・先生がその場で受付する運用
              -->
              <button class="primary" onclick="confirmPayment('現金')">
                現金受領
              </button>

              <!--
                PayPay受付
                ・現在は動作確認のため先生画面でも受付可能
                ・将来は会員画面（Googleフォーム/Firebase）へ移行予定
              -->
              <button class="primary" onclick="confirmPayment('PayPay')">
                PayPay受領
              </button>
            `
            : `<div class="ok">未払い金額はありません</div>`}
        `;
    }

    function confirmPayment(payType) {
      if (!currentPayment) {
        addLog("受領スキップ: 現在受付中の会員なし");
        return;
      }

      if (currentPayment.amount <= 0) {
        addLog("受領スキップ: 未払い金額なし");
        return;
      }

      const duplicate = paymentList.some(item =>
        currentPayment.billingGroupId && item.billingGroupId === currentPayment.billingGroupId
      );
      if (duplicate) {
        addLog("受領スキップ: 同じ請求グループを受付済み " + currentPayment.billingGroupId);
        return;
      }

      const payment = {
        memberId: currentPayment.memberId,
        memberName: currentPayment.memberName,
        billingGroupId: currentPayment.billingGroupId,
        targetMonth: currentPayment.targetMonth,
        planId: currentPayment.planId,
        feeType: currentPayment.feeType,
        amount: currentPayment.amount,
        payType: payType,
        invoiceItems: currentPayment.invoiceItems || [],
        invoiceIds: currentPayment.invoiceIds || [],
        invoiceCount: currentPayment.invoiceCount || 0,
        invoiceSummary: currentPayment.invoiceSummary || ""
      };

      paymentList.push(payment);
      addLog("登録完了: " + payment.memberId + " / " + payment.planId + " / " + payment.amount + "円 / " + payType);

      currentPayment = null;
      renderPaymentList();
      renderSummary();
      renderCompletion(payment);
    }

    function renderCompletion(payment) {
      const div = document.getElementById("currentPayment");
      div.innerHTML = `
        <div class="ok">✓ 登録完了</div>
        <div class="current-name">${escapeHtml(payment.memberName)}</div>
        <div>請求グループ: ${escapeHtml(payment.billingGroupId || "未設定")}</div>
        <div>プランID: ${escapeHtml(payment.planId || "未設定")}</div>
         <div class="amount">${formatYen(payment.amount)}円</div>
        <div>支払方法: ${escapeHtml(payment.payType)}</div>
        <button onclick="nextPayment()">次の集金</button>
      `;
    }

    function nextPayment() {
      currentPayment = null;
      renderCurrentPayment();
      document.getElementById("latest").textContent = "なし";
      lastText = "";
      lastReadTime = 0;
    }

    function renderPaymentList() {
      const ul = document.getElementById("paymentList");
      ul.innerHTML = "";

      paymentList.forEach((payment, index) => {
        const li = document.createElement("li");

        li.className = "payment-row";

        li.innerHTML = `
          <span class="payment-name">${escapeHtml(payment.memberName)}</span>
          <span class="payment-amount">${formatYen(payment.amount)}円</span>
          <span class="payment-type">${escapeHtml(payment.payType)}</span>
          <span class="payment-type">${escapeHtml(payment.planId)}</span>
        `;

        const deleteButton = document.createElement("button");
        deleteButton.textContent = "削除";
        deleteButton.className = "danger";
        deleteButton.onclick = () => deletePayment(index);

        li.appendChild(deleteButton);
        ul.appendChild(li);
      });
    }

    function deletePayment(index) {
      const removed = paymentList.splice(index, 1)[0];
      addLog("受付削除: " + removed.memberId + " / " + removed.amount + "円 / " + removed.payType);
      renderPaymentList();
      renderSummary();
    }

    function renderSummary() {
      let cashTotal = 0;
      let paypayTotal = 0;

      paymentList.forEach(payment => {
        if (payment.payType === "現金") {
          cashTotal += payment.amount;
        } else if (payment.payType === "PayPay") {
          paypayTotal += payment.amount;
        }
      });

      document.getElementById("cashTotal").textContent = formatYen(cashTotal);
      document.getElementById("paypayTotal").textContent = formatYen(paypayTotal);
      document.getElementById("grandTotal").textContent = formatYen(cashTotal + paypayTotal);
      document.getElementById("paymentCount").textContent = paymentList.length;
    }

    function sendPaymentsToGas() {
      if (!currentTeacherId) {
        addLog("送信スキップ: teacher_id未設定");
        return;
      }

      if (!currentLocationId) {
        addLog("送信スキップ: location_id未設定");
        return;
      }

      if (paymentList.length === 0) {
        addLog("送信スキップ: 受付済データなし");
        return;
      }

      const paymentItems = paymentList.flatMap(payment =>
        (payment.invoiceItems || []).map(invoice => ({
          invoice_id: invoice.invoice_id,
          member_id: invoice.member_id || payment.memberId,
          billing_group_id: invoice.billing_group_id || payment.billingGroupId,
          target_month: invoice.target_month || payment.targetMonth,
          member_name: payment.memberName,
          plan_id: invoice.plan_id || payment.planId,
          amount: Number(invoice.amount || 0),
          payment_method: payment.payType
        }))
      );

      const payload = {
        mode: "payment_batch",
        teacher_id: currentTeacherId,
        location_id: currentLocationId,
        payment_items: paymentItems,
        count: paymentItems.length,
        source: "payment_teacher.html"
      };

      addLog("GAS一括送信予定: " + JSON.stringify(payload));

      //初版では画面動作確認を優先するため、実送信は次ステップで有効化する。
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(payload)
      }).then(() => {
        addLog("GAS一括送信要求完了");
      }).catch(err => {
        addLog("GAS一括送信エラー: " + err);
      });
    }

    function postConfirmedPayments() {
      loadPaymentEvidenceLists();
    }

    function loadPaymentEvidenceLists() {
      addLog("決済情報取得開始");

      Promise.all([
        jsonp(GAS_URL, {
          action: "payment_evidence_list",
          target_month: targetMonth,
          statuses: "CONFIRMED",
          payment_method: "PAYPAY"
        }),
        jsonp(GAS_URL, {
          action: "payment_evidence_list",
          target_month: targetMonth,
          statuses: "POSTED",
          payment_method: "PAYPAY"
        })
      ]).then(function(results) {
        const confirmedResult = results[0] || {};
        const postedResult = results[1] || {};

        confirmedEvidences = Array.isArray(confirmedResult.evidences)
          ? confirmedResult.evidences
          : [];

        postedEvidences = Array.isArray(postedResult.evidences)
          ? postedResult.evidences
          : [];

        renderConfirmedEvidences();
        renderPostedEvidences();

        addLog(
          "決済情報取得完了: CONFIRMED=" + confirmedEvidences.length +
          " / POSTED=" + postedEvidences.length
        );
      }).catch(function(error) {
        addLog("決済情報取得失敗: " + (error.message || String(error)));
      });
    }

    function renderConfirmedEvidences() {
      const ul = document.getElementById("confirmedEvidenceList");
      if (!ul) return;

      ul.innerHTML = "";

      confirmedEvidences.forEach(function(evidence, index) {
        const li = document.createElement("li");
        li.className = "evidence-row";

        li.innerHTML = `
          <input type="checkbox" class="confirmedEvidenceCheck" data-index="${index}" checked>
          <div class="evidence-main">
            <div class="evidence-title">${escapeHtml(evidence.member_name || evidence.member_id)} / ${escapeHtml(evidence.label || evidence.plan_id || "")}</div>
            <div class="evidence-sub">${escapeHtml(evidence.target_month || "")} / ${escapeHtml(evidence.payment_method_label || evidence.payment_method || "")}</div>
            <div class="evidence-sub">コード: ${escapeHtml(evidence.evidence_code || "未設定")}</div>
            <div class="evidence-sub">evidence_id: ${escapeHtml(evidence.evidence_id || "")}</div>
          </div>
          <div class="evidence-amount">${formatYen(evidence.amount)}円</div>
        `;

        ul.appendChild(li);
      });

      document.getElementById("confirmedEvidenceCount").textContent = confirmedEvidences.length;
      document.getElementById("confirmedEvidenceTotal").textContent = formatYen(
        confirmedEvidences.reduce(function(sum, evidence) {
          return sum + Number(evidence.amount || 0);
        }, 0)
      );
    }

    function renderPostedEvidences() {
      const ul = document.getElementById("postedEvidenceList");
      if (!ul) return;

      ul.innerHTML = "";

      postedEvidences.forEach(function(evidence) {
        const li = document.createElement("li");
        li.className = "evidence-row";

        li.innerHTML = `
          <span>✔</span>
          <div class="evidence-main">
            <div class="evidence-title">${escapeHtml(evidence.member_name || evidence.member_id)} / ${escapeHtml(evidence.label || evidence.plan_id || "")}</div>
            <div class="evidence-sub">${escapeHtml(evidence.target_month || "")} / ${escapeHtml(evidence.payment_method_label || evidence.payment_method || "")}</div>
            <div class="evidence-sub">POSTED: ${escapeHtml(evidence.posted_at || "")}</div>
            <div class="evidence-sub">payment_log_id: ${escapeHtml(evidence.payment_log_id || "")}</div>
          </div>
          <div class="evidence-amount">${formatYen(evidence.amount)}円</div>
        `;

        ul.appendChild(li);
      });

      document.getElementById("postedEvidenceCount").textContent = postedEvidences.length;
      document.getElementById("postedEvidenceTotal").textContent = formatYen(
        postedEvidences.reduce(function(sum, evidence) {
          return sum + Number(evidence.amount || 0);
        }, 0)
      );
    }

    function selectAllConfirmedEvidences(checked) {
      document.querySelectorAll(".confirmedEvidenceCheck").forEach(function(input) {
        input.checked = checked;
      });
    }

    function getSelectedConfirmedEvidences() {
      const selected = [];

      document.querySelectorAll(".confirmedEvidenceCheck").forEach(function(input) {
        if (!input.checked) return;

        const index = Number(input.getAttribute("data-index"));
        const evidence = confirmedEvidences[index];
        if (evidence && evidence.evidence_id) {
          selected.push(evidence);
        }
      });

      return selected;
    }

    function postSelectedConfirmedEvidences() {
      if (!currentTeacherId) {
        addLog("決済更新スキップ: teacher_id未設定");
        return;
      }

      const selected = getSelectedConfirmedEvidences();
      if (selected.length === 0) {
        addLog("決済更新スキップ: 選択されたCONFIRMEDがありません。 ");
        return;
      }

      const payload = {
        mode: "payment_evidence_post_selected",
        teacher_id: currentTeacherId,
        location_id: currentLocationId,
        evidence_items: selected.map(function(evidence) {
          return {
            evidence_id: evidence.evidence_id
          };
        }),
        count: selected.length,
        source: "payment_teacher.html"
      };

      addLog("選択決済更新送信予定: " + JSON.stringify(payload));

      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(payload)
      }).then(function() {
        addLog("選択決済更新要求完了。数秒後に一覧を再取得します。 ");
        window.setTimeout(loadPaymentEvidenceLists, 2500);
      }).catch(function(err) {
        addLog("選択決済更新エラー: " + err);
      });
    }

    function resetScreen() {
      document.getElementById("log").innerHTML = "";
      document.getElementById("latest").textContent = "なし";
      lastText = "";
      lastReadTime = 0;
      currentPayment = null;
      paymentList = [];
      confirmedEvidences = [];
      postedEvidences = [];
      renderCurrentPayment();
      renderPaymentList();
      renderSummary();
      renderConfirmedEvidences();
      renderPostedEvidences();
    }

    function addLog(message) {
      const li = document.createElement("li");
      const time = new Date().toLocaleTimeString();
      li.textContent = "[" + time + "] " + message;
      document.getElementById("log").prepend(li);
    }

    function formatYen(value) {
      return Number(value || 0).toLocaleString("ja-JP");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.frequency.value = 880;
        gain.gain.value = 0.08;

        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.08);
      } catch (e) {
        // 音が出なくても無視
      }

      if (navigator.vibrate) {
        navigator.vibrate(100);
      }
    }

  function loadMemberForPayment(memberId, planId) {
    addLog("会費情報登録開始: member_id=" + memberId + " / plan_id=" + planId);

    if (!memberId) {
      addLog("会費情報取得中止: member_id が空です。");
      return;
    }

    if (!planId) {
      addLog("会費情報取得中止: plan_id が空です。");
      return;
    }

    jsonp(GAS_URL, {
      action: "getPaymentInfo",
      member_id: memberId,
      plan_id: planId
    }).then(function(result) {
      addLog("GAS応答(getPaymentInfo): " + JSON.stringify(result));

      if (!result) {
        addLog("会費情報取得エラー: GAS応答が空です。");
        return;
      }

      if (result.ok !== true && result.success !== true) {
        addLog("会費情報取得エラー: " + (result.message || "ok=false"));
        return;
      }

      const normalized = {
        memberId: result.memberId || result.member_id || memberId,
        memberName: result.memberName || result.member_name || "",
        billingGroupId: result.billingGroupId || result.billing_group_id || "",
        targetMonth: result.targetMonth || result.target_month || "",
        planId: result.planId || result.plan_id || result.planType || planId,
        feeType: result.feeType || result.fee_type || result.planType || result.planId || planId,
        amount: Number(
          result.amount != null
            ? result.amount
            : (result.unpaidAmount != null ? result.unpaidAmount : 0)
        ),

        invoiceItems: Array.isArray(result.invoiceItems) ? result.invoiceItems : [],
        invoiceIds: Array.isArray(result.invoiceIds) ? result.invoiceIds : [],
        invoiceCount: Number(result.invoiceCount || 0),
        invoiceSummary: result.invoiceSummary || ""
      };

      addLog("会費情報正規化: " + JSON.stringify(normalized));

      const duplicate = paymentList.some(function(payment) {
        return normalized.billingGroupId &&
          payment.billingGroupId === normalized.billingGroupId;
      });

      if (duplicate) {
        addLog("受付中止: 同じ請求グループを受付済みです: " + normalized.billingGroupId);
        return;
      }

      currentPayment = normalized;

      renderCurrentPayment();

      addLog("会費情報取得完了: " + normalized.memberName);
    }).catch(function(error) {
      addLog("会費情報取得失敗: " + (error.message || String(error)));
    });
  }

  function jsonp(url, params) {
    return new Promise(function(resolve, reject) {
      const callbackName =
        "paymentCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      const script = document.createElement("script");

      const query = new URLSearchParams(
        Object.assign({}, params, { callback: callbackName })
      );

      const fullUrl = url + "?" + query.toString();

      addLog("JSONP URL: " + fullUrl);

      let finished = false;

      const timeout = window.setTimeout(function() {
        cleanup();
        reject(new Error("GAS応答がタイムアウトしました。"));
      }, 15000);

      function cleanup() {
        if (finished) return;
        finished = true;

        window.clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (e) {
          window[callbackName] = undefined;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      window[callbackName] = function(result) {
        addLog("JSONP callback受信: " + JSON.stringify(result));
        cleanup();
        resolve(result);
      };

      script.onerror = function() {
        addLog("JSONP script error発生。ただしtimeoutまで待機: " + fullUrl);
        // ここでは cleanup / reject しない
        // iPhone Safariで script error が先に発生しても、
        // callback が後から来る可能性を見るため。
      };

      script.onload = function() {
        addLog("JSONP script load完了: " + fullUrl);
      };

      script.async = true;
      script.src = fullUrl;

      document.head.appendChild(script);
    });
  }

  //　未使用予備 
  function loadMemberForPayment_fetch(memberId, planId) {
    addLog("会費情報登録中(fetch getPaymentInfo): " + memberId + " / " + planId);

    const query = new URLSearchParams({
      action: "getPaymentInfo",
      member_id: memberId,
      plan_id: planId,
      _ts: Date.now()
    });

    const fullUrl = GAS_URL + "?" + query.toString();
    addLog("FETCH URL: " + fullUrl);

    fetch(fullUrl, {
      method: "GET",
      cache: "no-store"
    })
      .then(function(response) {
        addLog("fetch status: " + response.status + " / ok=" + response.ok);
        return response.text();
      })
      .then(function(text) {
        addLog("fetch raw: " + text.substring(0, 300));

        const result = JSON.parse(text);
        addLog("GAS応答(fetch): " + JSON.stringify(result));

        if (!result || !result.success) {
          addLog((result && result.message) || "会費情報取得エラー");
          return;
        }

        const duplicate = paymentList.some(function(payment) {
          return result.billingGroupId && payment.billingGroupId === result.billingGroupId;
        });

        if (duplicate) {
          addLog("同じ請求グループを受付済みです: " + result.billingGroupId);
          return;
        }

        currentPayment = {
          memberId: result.memberId,
          memberName: result.memberName,
          billingGroupId: result.billingGroupId || "",
          targetMonth: result.targetMonth || "",
          planId: result.planId || "",
          feeType: result.feeType || "未設定",
          amount: Number(result.amount || 0)
        };

        renderCurrentPayment();
        addLog("会費情報取得完了(fetch): " + result.memberName);
      })
      .catch(function(error) {
        addLog("fetch 会費情報取得失敗: " + (error.message || String(error)));
      });
  }
