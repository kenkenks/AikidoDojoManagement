<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPay決済コード登録</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body.member { background:#E3F2FD; }
    .amount { font-size:28px; font-weight:bold; margin:8px 0; }
    .ok { color:green; font-weight:bold; }
    .warn { color:#c47a00; font-weight:bold; }
    .error { color:#b00020; font-weight:bold; }
    .readonly { background:#f8f8f8; }
    .row { margin:8px 0; }
    ul { padding-left:20px; }
    li { margin-bottom:6px; }
    .code-input { letter-spacing:1px; }
  </style>
</head>
<body class="member">
  <h1>📲 PayPay決済コード登録</h1>

  <section class="card">
    <h2>会員情報</h2>
    <label>会員ID</label>
    <input id="memberId" placeholder="例：M001">
    <label>プランID</label>
    <input id="planId" placeholder="例：P001">
    <button class="primary member" onclick="startPayPayCode()">会費情報を表示</button>
    <div id="startResult" class="note"></div>
  </section>

  <section class="card" id="paymentInfoCard" style="display:none;">
    <h2>支払い情報</h2>
    <div class="row">会員名: <strong id="memberName">-</strong></div>
    <div class="row">対象月: <span id="targetMonth">-</span></div>
    <div class="row">会費タイプ: <span id="feeType">-</span></div>
    <div class="row">支払状態: <span id="status">-</span></div>
    <div class="row">請求明細: <span id="invoiceSummary">-</span></div>
    <div class="amount"><span id="amount">0</span>円</div>
    <div class="note">PayPayで上記金額を支払い、決済コードをコピーして下へ貼り付けてください。</div>
    <h3>対象エビデンス</h3>
    <ul id="evidenceList"></ul>
  </section>

  <section class="card" id="codeCard" style="display:none;">
    <h2>決済コード</h2>
    <label>PayPay決済コード</label>
    <input id="paypayCode" class="code-input" placeholder="PayPayの決済コードを貼り付け">
    <button class="primary member" onclick="recordPayPayCode()">決済コードを登録</button>
    <div id="recordResult" class="note"></div>
  </section>

  <section class="card">
    <h2>操作ログ</h2>
    <ul id="log"></ul>
  </section>

  <p class="note"><a href="member_home.html">会員ホームへ戻る</a></p>

  <script src="virtual_session.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_Movz5VBZkf8qHdMkR7kkQRkLkYJAbahN5OPStFT8YXnhCuIGJBCdqjy2PwgWaorUfA/exec";

    let currentPayPay = null;

    window.addEventListener("load", function() {
      const params = new URLSearchParams(window.location.search);
      const memberSession = DojoVirtualSession.get();
      const memberId = params.get("member_id") ||
        (memberSession && memberSession.role === "MEMBER" ? memberSession.member_id : "") || "";
      const planId = params.get("plan_id") || "";

      document.getElementById("memberId").value = memberId;
      document.getElementById("planId").value = planId;

      if (memberId && planId) {
        addLog("URLパラメータ取得: " + memberId + " / " + planId);
        startPayPayCode();
      }
    });

    function startPayPayCode() {
      const memberId = document.getElementById("memberId").value.trim();
      const planId = document.getElementById("planId").value.trim();

      if (!memberId) {
        setMessage("startResult", "member_id がありません。", "error");
        return;
      }
      if (!planId) {
        setMessage("startResult", "plan_id がありません。", "error");
        return;
      }

      addLog("PayPay開始: " + memberId + " / " + planId);
      setMessage("startResult", "会費情報を取得しています...", "note");

      jsonp(GAS_URL, {
        action: "paypay_code_start",
        member_id: memberId,
        plan_id: planId
      }).then(function(result) {
        addLog("GAS応答(paypay_code_start): " + JSON.stringify(result));

        if (!result || result.ok !== true) {
          setMessage("startResult", (result && result.message) || "会費情報を取得できませんでした。", "error");
          return;
        }

        currentPayPay = result;
        renderPaymentInfo(result);
        setMessage("startResult", "会費情報を取得しました。", "ok");

      }).catch(function(error) {
        addLog("PayPay開始失敗: " + (error.message || String(error)));
        setMessage("startResult", "会費情報取得に失敗しました。", "error");
      });
    }

    function renderPaymentInfo(info) {
      document.getElementById("paymentInfoCard").style.display = "block";
      document.getElementById("codeCard").style.display = Number(info.amount || 0) > 0 ? "block" : "none";

      document.getElementById("memberName").textContent = info.memberName || "-";
      document.getElementById("targetMonth").textContent = info.targetMonth || "-";
      document.getElementById("feeType").textContent = info.feeType || info.planId || "-";
      document.getElementById("status").textContent = info.status || "-";
      document.getElementById("invoiceSummary").textContent = info.invoiceSummary || "-";
      document.getElementById("amount").textContent = formatYen(Number(info.amount || 0));

      const evidenceList = document.getElementById("evidenceList");
      evidenceList.innerHTML = "";

      (info.evidenceItems || []).forEach(function(evidence) {
        const li = document.createElement("li");
        li.textContent = evidence.invoice_id + " / " + evidence.evidence_id + " / " + evidence.status;
        evidenceList.appendChild(li);
      });

      if (!info.evidenceItems || info.evidenceItems.length === 0) {
        const li = document.createElement("li");
        li.textContent = "対象エビデンスなし";
        evidenceList.appendChild(li);
      }
    }

    function recordPayPayCode() {
      if (!currentPayPay) {
        setMessage("recordResult", "会費情報を先に表示してください。", "error");
        return;
      }

      const code = document.getElementById("paypayCode").value.trim();
      if (!code) {
        setMessage("recordResult", "PayPay決済コードを入力してください。", "error");
        return;
      }

      const evidenceItems = currentPayPay.evidenceItems || [];
      if (evidenceItems.length === 0) {
        setMessage("recordResult", "登録対象の決済エビデンスがありません。", "error");
        return;
      }

      const payload = {
        mode: "paypay_code_record",
        member_id: currentPayPay.memberId,
        plan_id: currentPayPay.planId,
        evidence_code: code,
        evidence_items: evidenceItems,
        source: "paypay_code.html"
      };

      addLog("PayPayコード登録送信予定: " + JSON.stringify(payload));
      setMessage("recordResult", "決済コードを送信しています...", "note");

      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(payload)
      }).then(function() {
        setMessage("recordResult", "決済コード登録要求を送信しました。先生の決済更新後に入金反映されます。", "ok");
        addLog("PayPayコード登録要求完了");
      }).catch(function(error) {
        setMessage("recordResult", "決済コード登録送信に失敗しました。", "error");
        addLog("PayPayコード登録送信エラー: " + error);
      });
    }

    function jsonp(url, params) {
      return new Promise(function(resolve, reject) {
        const callbackName = "paypayCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const script = document.createElement("script");
        const query = new URLSearchParams(Object.assign({}, params, { callback: callbackName, _ts: Date.now() }));
        const fullUrl = url + "?" + query.toString();

        addLog("JSONP URL: " + fullUrl);

        let finished = false;
        const timeout = window.setTimeout(function() {
          cleanup();
          reject(new Error("GAS応答がタイムアウトしました。"));
        }, 15000);

        function cleanup() {
          if (finished) return;
          finished = true;
          window.clearTimeout(timeout);
          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = function(result) {
          addLog("JSONP callback受信: " + JSON.stringify(result));
          cleanup();
          resolve(result);
        };

        script.onerror = function() {
          addLog("JSONP script error。ただしtimeoutまで待機: " + fullUrl);
        };

        script.async = true;
        script.src = fullUrl;
        document.head.appendChild(script);
      });
    }

    function setMessage(id, message, className) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.className = className || "note";
    }

    function addLog(message) {
      const li = document.createElement("li");
      const time = new Date().toLocaleTimeString();
      li.textContent = "[" + time + "] " + message;
      document.getElementById("log").prepend(li);
    }

    function formatYen(value) {
      return Number(value || 0).toLocaleString("ja-JP");
    }
  </script>
</body>
</html>
