<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>会員ホーム</title><link rel="stylesheet" href="common.css"></head>
<body class="member">
  <h1>🥋 会員ホーム</h1>
  <section class="card login-state"><strong id="loginIdentity">未ログイン</strong><button onclick="logoutSession()">ログアウト</button></section>
  <section class="card">
    <h2>会員メニュー</h2>
    <div class="grid">
      <a class="button member-link" href="attendance.html">🥋 出席登録</a>
      <a class="button member-link" href="paypay_code.html">📲 PayPay決済コード登録</a>
      <a class="button member-link" href="#">💰 会費状況（準備中）</a>
      <a class="button member-link" id="attendanceSummaryLink" href="attendance_summary.html">📅 出席・審査進捗</a>
      <a class="button member-link" href="#">📢 お知らせ（準備中）</a>
    </div>
  </section>
  <p class="note"><a href="index.html">入口へ戻る</a></p>
  <script src="virtual_session.js"></script>
  <script>
    const queryMemberId = new URLSearchParams(location.search).get("member_id") || "";
    if (queryMemberId) DojoVirtualSession.loginMember(queryMemberId, "PAGE_URL");
    const memberSession = DojoVirtualSession.get();
    const memberId = memberSession && memberSession.role === "MEMBER" ? memberSession.member_id : queryMemberId;
    if (memberId) {
      document.getElementById("loginIdentity").textContent = "会員 " + memberId + " でログイン中";
      document.getElementById("attendanceSummaryLink").href =
        "attendance_summary.html?member_id=" + encodeURIComponent(memberId);
    }
    function logoutSession() {
      DojoVirtualSession.logout();
      location.href = "index.html";
    }
  </script>
  <script src="system_context.js"></script>
</body></html>
