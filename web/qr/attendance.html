<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合気道 会員ページ - 出席受付</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { color-scheme: light; --green: #176b45; --amber: #9b6100; --red: #b3261e; }
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 16px; background: #e8f5e9; color: #222; }
    .role-badge { display:inline-block; padding:4px 8px; border-radius:999px; background:#d7efe0; color:#176b45; font-size:12px; font-weight:bold; margin-bottom:8px; }
    .top-nav { margin:0 0 12px; }
    .top-nav a { display:inline-block; margin:0 6px 6px 0; padding:7px 10px; border-radius:8px; border:1px solid #b7d8c4; background:#fff; color:#176b45; text-decoration:none; font-size:14px; }
    h1 { font-size: 22px; margin: 0 0 12px; }
    h2 { font-size: 17px; margin: 0 0 10px; }
    .card { background: #fff; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; }
    .key-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .key { padding: 9px; background: #f7f7f7; border-radius: 8px; }
    .label { display: block; color: #666; font-size: 12px; margin-bottom: 3px; }
    .ok { color: var(--green); font-weight: bold; }
    .warn { color: var(--amber); font-weight: bold; }
    .error { color: var(--red); font-weight: bold; }
    #reader { width: 100%; max-width: 420px; margin: 0 auto 10px; }
    button { font-size: 15px; padding: 9px 12px; margin: 3px; border: 1px solid #aaa; border-radius: 8px; background: #fff; }
    button.primary { color: #fff; background: var(--green); border-color: var(--green); }
    button.slot.selected { color: #fff; background: #2a6fbb; border-color: #2a6fbb; }
    button.danger { color: var(--red); }
    button:disabled { opacity: .45; }
    select { width: 100%; font-size: 16px; padding: 10px; border: 1px solid #aaa; border-radius: 8px; background: #fff; }
    [hidden] { display: none !important; }
    .candidate { border-top: 1px solid #e1e1e1; padding: 10px 0; }
    .candidate:first-child { border-top: 0; }
    .candidate-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .candidate-name { font-weight: bold; }
    .slots { margin-top: 7px; }
    .rank-row { display: grid; grid-template-columns: 90px 1fr; gap: 8px; align-items: center; margin-top: 8px; }
    .rank-row select { padding: 7px; font-size: 15px; }
    .progress { margin-top: 6px; padding: 7px 9px; border-radius: 7px; background: #f4f8fb; font-size: 14px; }
    .progress.near { background: #fff3cd; color: #6d4c00; font-weight: bold; }
    .progress.ready { background: #dff3e6; color: #176b45; font-weight: bold; }
    .empty { color: #777; }
    .latest { font-size: 13px; word-break: break-all; }
    #log { padding-left: 20px; margin-bottom: 0; }
    @media (max-width: 420px) { .key-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="role-badge">会員画面</div>
  <h1>合気道 出席受付</h1>
  <nav class="top-nav"><a href="member_home.html">会員ホーム</a><a href="paypay_code.html">PayPay決済コード登録</a><a href="index.html">入口</a></nav>

  <section class="card key-grid">
    <div class="key"><span class="label">道場</span><span id="locationId" class="warn">未設定</span></div>
    <div class="key"><span class="label">課金枠</span><span id="billingBlockId" class="warn">未設定</span></div>
    <div class="key"><span class="label">先生</span><span id="teacherId" class="warn">未設定</span></div>
    <div class="key"><span class="label">稽古日</span><span id="attendanceDate"></span></div>
  </section>

  <section id="blockChoiceCard" class="card" hidden>
    <h2>課金枠を選択</h2>
    <div class="warn">現在時刻から一つに絞れませんでした。</div>
    <select id="blockChoice" onchange="selectBillingBlock(this.value)"></select>
  </section>

  <section class="card">
    <div id="reader"></div>
    <button type="button" onclick="startScan()">読み取り開始</button>
    <button type="button" onclick="stopScan()">停止</button>
  </section>

  <section class="card">
    <h2>出席する会員と稽古枠</h2>
    <label for="candidateSort">並び順</label>
    <select id="candidateSort" onchange="renderCandidates()">
      <option value="scan">読取順</option>
      <option value="rank">級・段順</option>
      <option value="exam">審査が近い順</option>
    </select>
    <div id="memberCandidates" class="empty">会員QRを読み取ってください。</div>
    <button id="sendButton" class="primary" type="button" onclick="sendCandidatesToGas()">選択した出席を登録</button>
    <button type="button" onclick="clearCandidates()">会員一覧をクリア</button>
  </section>

  <section class="card">
    <span class="label">最新読み取り</span>
    <div id="latest" class="latest">なし</div>
  </section>

  <section class="card">
    <h2>操作ログ</h2>
    <ul id="log"></ul>
  </section>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_Movz5VBZkf8qHdMkR7kkQRkLkYJAbahN5OPStFT8YXnhCuIGJBCdqjy2PwgWaorUfA/exec";
    const memberNameMap = { M001: "山田太郎", M002: "川本花子", M003: "佐藤一郎" };

    let html5QrCode = null;
    let scanning = false;
    let currentLocationId = "";
    let currentBillingBlockId = "";
    let currentTeacherId = "";
    let currentSlots = [];
    let memberCandidates = [];
    let lastText = "";
    let lastReadTime = 0;
    let attendanceSessionId = createSessionId();
    let submitting = false;
    let rankOptions = [];

    document.getElementById("attendanceDate").textContent = currentAttendanceDate();
    window.addEventListener("dojo-system-context", function() {
      document.getElementById("attendanceDate").textContent = currentAttendanceDate();
      if (currentLocationId) loadAttendanceSessionInfo();
    });
    updateSendButton();
    loadRankOptions();

    function loadRankOptions() {
      return jsonp(GAS_URL, { action: "attendance_rank_options" }).then(function(data) {
        if (!data.ok) throw new Error(data.message || "級段位マスタを取得できませんでした。");
        rankOptions = Array.isArray(data.rank_options) ? data.rank_options : [];
        renderCandidates();
      }).catch(function(error) {
        addLog("級段位マスタ取得エラー: " + (error.message || String(error)), "error");
      });
    }

    function startScan() {
      if (scanning) return;
      html5QrCode = html5QrCode || new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        function () {}
      ).then(function () {
        scanning = true;
        addLog("カメラを起動しました。");
      }).catch(function (error) {
        addLog("カメラ起動エラー: " + error, "error");
      });
    }

    function stopScan() {
      if (!html5QrCode || !scanning) return;
      html5QrCode.stop().then(function () {
        scanning = false;
        addLog("読み取りを停止しました。");
      }).catch(function (error) {
        addLog("停止エラー: " + error, "error");
      });
    }

    function onScanSuccess(decodedText) {
      if (submitting) return;
      const now = Date.now();
      if (decodedText === lastText && now - lastReadTime < 2000) return;
      lastText = decodedText;
      lastReadTime = now;
      document.getElementById("latest").textContent = decodedText;

      const parsed = parseQrText(decodedText);
      if (parsed.location_id || parsed.billing_block_id) {
        if (parsed.location_id) currentLocationId = parsed.location_id;
        currentBillingBlockId = parsed.billing_block_id || "";
        currentSlots = [];
        renderKeys();
        addLog(parsed.billing_block_id ? "道場・課金枠QRを読み取りました。" : "道場QRを読み取りました。課金枠を自動判定します。");
        beep();
        loadAttendanceSessionInfo();
        return;
      }
      if (parsed.teacher_id) {
        currentTeacherId = parsed.teacher_id;
        renderKeys();
        addLog("先生QR読取: " + currentTeacherId);
        beep();
        return;
      }
      if (parsed.member_id) {
        if (currentSlots.length === 0) {
          addLog("先に道場QRを読み取り、課金枠を確定してください。", "error");
          beep(330);
          return;
        }
        addMemberCandidate(parsed.member_id);
        beep();
        return;
      }
      addLog("未分類QR: " + decodedText, "error");
      beep(330);
    }

    function parseQrText(text) {
      const result = { location_id: "", billing_block_id: "", teacher_id: "", member_id: "" };
      try {
        const url = new URL(text);
        Object.keys(result).forEach(function (key) { result[key] = url.searchParams.get(key) || ""; });
        return result;
      } catch (error) {
        String(text).split(/[&\n]/).forEach(function (part) {
          const separator = part.indexOf("=");
          if (separator < 1) return;
          const key = part.slice(0, separator).trim();
          const value = part.slice(separator + 1).trim();
          if (Object.prototype.hasOwnProperty.call(result, key)) result[key] = value;
        });
        return result;
      }
    }

    function loadAttendanceSessionInfo() {
      if (!currentLocationId) {
        currentSlots = [];
        renderCandidates();
        addLog("location_id が必要です。", "error");
        return;
      }

      const params = {
        action: "attendance_session_info",
        location_id: currentLocationId
      };
      if (currentBillingBlockId) params.billing_block_id = currentBillingBlockId;

      jsonp(GAS_URL, params).then(function (data) {
        if (!data.ok) throw new Error(data.message || "稽古枠を取得できませんでした。");
        document.getElementById("locationId").textContent = data.location_name + " (" + data.location_id + ")";
        document.getElementById("locationId").className = "ok";

        if (data.requires_selection) {
          currentBillingBlockId = "";
          currentSlots = [];
          clearCandidates(true);
          setKey("billingBlockId", "");
          updateSendButton();
          renderBlockChoices(data.billing_block_candidates || []);
          addLog(data.message || "課金枠を選択してください。", "warn");
          return;
        }

        document.getElementById("blockChoiceCard").hidden = true;
        currentBillingBlockId = data.billing_block_id;
        currentSlots = data.slots || [];
        document.getElementById("billingBlockId").textContent = data.billing_block_name;
        document.getElementById("billingBlockId").className = "ok";
        clearCandidates(true);
        addLog((data.inferred ? "現在時刻から自動判定: " : "課金枠を設定: ") + data.billing_block_name);
      }).catch(function (error) {
        currentSlots = [];
        renderCandidates();
        addLog(error.message || String(error), "error");
      });
    }

    function renderBlockChoices(candidates) {
      const card = document.getElementById("blockChoiceCard");
      const select = document.getElementById("blockChoice");
      select.innerHTML = "";
      const emptyOption = document.createElement("option");
      emptyOption.value = "";
      emptyOption.textContent = candidates.length ? "課金枠を選んでください" : "選択できる課金枠がありません";
      select.appendChild(emptyOption);
      candidates.forEach(function (candidate) {
        const option = document.createElement("option");
        option.value = candidate.billing_block_id;
        option.textContent = candidate.label + "（" + candidate.start_time + "–" + candidate.end_time + "）";
        select.appendChild(option);
      });
      select.disabled = candidates.length === 0;
      card.hidden = false;
    }

    function selectBillingBlock(billingBlockId) {
      if (!billingBlockId) return;
      currentBillingBlockId = billingBlockId;
      renderKeys();
      loadAttendanceSessionInfo();
    }

    function addMemberCandidate(memberId) {
      if (submitting) {
        addLog("送信確認中のため、会員追加を待ってください。", "warn");
        return;
      }
      if (memberCandidates.some(function (candidate) { return candidate.member_id === memberId; })) {
        addLog("二重スキャンを無視しました: " + memberId);
        return;
      }
      memberCandidates.push({
        member_id: memberId,
        member_name: "",
        current_rank: "",
        next_rank: "",
        rank_changed: false,
        training_count: 0,
        required_training_count: 0,
        remaining_training_count: null,
        examination_ready: false,
        slot_ids: [],
        loaded: false,
        load_error: ""
      });
      renderCandidates();
      addLog("会員QR読取: " + memberId + "（登録済み出席を確認中）");
      loadMemberAttendanceState(memberId);
    }

    function loadMemberAttendanceState(memberId, expectedState, quiet) {
      return jsonp(GAS_URL, {
        action: "member_attendance_state",
        attendance_date: currentAttendanceDate(),
        member_id: memberId,
        location_id: currentLocationId,
        billing_block_id: currentBillingBlockId
      }).then(function (data) {
        if (!data.ok) throw new Error(data.message || "登録済み出席を取得できませんでした。");
        const candidate = memberCandidates.find(function (item) { return item.member_id === memberId; });
        if (!candidate) return { ok: false, matches: false, member_id: memberId };
        const actualSlotIds = normalizeSlotIds(data.selected_slot_ids || []);
        candidate.slot_ids = actualSlotIds;
        candidate.member_name = data.member_name || "";
        candidate.current_rank = data.current_rank || "";
        candidate.next_rank = data.next_rank || "";
        candidate.rank_changed = false;
        candidate.training_count = Number(data.training_count || 0);
        candidate.required_training_count = Number(data.required_training_count || 0);
        candidate.remaining_training_count = data.remaining_training_count === null
          ? null
          : Number(data.remaining_training_count);
        candidate.examination_ready = data.examination_ready === true;
        candidate.loaded = true;
        candidate.load_error = "";
        renderCandidates();
        const slotMatches = !expectedState ||
          slotIdsEqual(actualSlotIds, normalizeSlotIds(expectedState.slot_ids || []));
        const rankMatches = !expectedState || data.current_rank === expectedState.current_rank;
        if (!quiet) addLog(memberId + " の登録済み枠を復元しました（" + candidate.slot_ids.length + "枠）。");
        return { ok: true, matches: slotMatches && rankMatches, member_id: memberId };
      }).catch(function (error) {
        const candidate = memberCandidates.find(function (item) { return item.member_id === memberId; });
        if (!candidate) return { ok: false, matches: false, member_id: memberId };
        candidate.loaded = false;
        candidate.load_error = error.message || String(error);
        renderCandidates();
        if (!quiet) addLog(memberId + " の状態取得に失敗: " + candidate.load_error, "error");
        return { ok: false, matches: false, member_id: memberId };
      });
    }

    function refreshAllMemberStates(expectedByMember, attempt) {
      attempt = Number(attempt || 1);
      memberCandidates.forEach(function(candidate) {
        candidate.loaded = false;
        candidate.load_error = "";
      });
      renderCandidates();

      return Promise.all(memberCandidates.map(function(candidate) {
        return loadMemberAttendanceState(
          candidate.member_id,
          expectedByMember[candidate.member_id],
          attempt > 1
        );
      })).then(function(results) {
        const failed = results.filter(function(result) { return !result.ok; });
        const mismatched = results.filter(function(result) { return result.ok && !result.matches; });
        if ((failed.length > 0 || mismatched.length > 0) && attempt < 6) {
          addLog("GASの保存完了を待っています（確認 " + attempt + "/6）。", "warn");
          return new Promise(function(resolve) {
            window.setTimeout(function() {
              resolve(refreshAllMemberStates(expectedByMember, attempt + 1));
            }, 700);
          });
        }
        if (failed.length > 0 || mismatched.length > 0) {
          const ids = failed.concat(mismatched).map(function(result) { return result.member_id; });
          addLog("画面選択と保存結果を確認できません: " + Array.from(new Set(ids)).join(", "), "error");
          return false;
        }
        addLog("登録結果を再取得し、画面と出席ログの一致を確認しました。", "ok");
        return true;
      });
    }

    function toggleSlot(memberId, slotId) {
      const candidate = memberCandidates.find(function (item) { return item.member_id === memberId; });
      if (!candidate || !candidate.loaded || submitting) return;
      const index = candidate.slot_ids.indexOf(slotId);
      if (index >= 0) candidate.slot_ids.splice(index, 1);
      else candidate.slot_ids.push(slotId);
      renderCandidates();
    }

    function removeCandidate(memberId) {
      if (submitting) return;
      memberCandidates = memberCandidates.filter(function (item) { return item.member_id !== memberId; });
      renderCandidates();
    }

    function renderCandidates() {
      const container = document.getElementById("memberCandidates");
      container.innerHTML = "";
      container.className = memberCandidates.length ? "" : "empty";
      if (memberCandidates.length === 0) {
        container.textContent = currentSlots.length ? "会員QRを読み取ってください。" : "先に道場QRを読み取り、課金枠を確定してください。";
        updateSendButton();
        return;
      }

      sortedCandidates().forEach(function (candidate) {
        const row = document.createElement("div");
        row.className = "candidate";
        const head = document.createElement("div");
        head.className = "candidate-head";
        const name = document.createElement("span");
        name.className = "candidate-name";
        name.textContent = candidate.member_id + "：" + (candidate.member_name || memberNameMap[candidate.member_id] || "氏名は管理側で確認");
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "danger";
        remove.textContent = "削除";
        remove.disabled = submitting;
        remove.onclick = function () { removeCandidate(candidate.member_id); };
        head.append(name, remove);
        row.appendChild(head);

        const rankRow = document.createElement("div");
        rankRow.className = "rank-row";
        const rankLabel = document.createElement("span");
        rankLabel.textContent = "現在級・段";
        const rankSelect = document.createElement("select");
        buildRankOptions(rankSelect, candidate.current_rank);
        rankSelect.disabled = !candidate.loaded || submitting;
        rankSelect.onchange = function () {
          candidate.current_rank = rankSelect.value;
          candidate.rank_changed = true;
          renderCandidates();
        };
        rankRow.append(rankLabel, rankSelect);
        row.appendChild(rankRow);

        const progress = document.createElement("div");
        progress.className = "progress";
        if (candidate.rank_changed) {
          progress.textContent = "級段位変更後の進捗は、出席登録後に更新します。";
        } else if (candidate.required_training_count > 0) {
          const target = candidate.next_rank || "次回審査";
          progress.textContent = candidate.training_count + "/" + candidate.required_training_count +
            (candidate.examination_ready
              ? "（" + target + "の必要稽古数到達・先生確認）"
              : "（" + target + "まであと " + candidate.remaining_training_count + "回）");
          if (candidate.examination_ready) progress.classList.add("ready");
          else if (candidate.remaining_training_count !== null && candidate.remaining_training_count <= 5) progress.classList.add("near");
        } else {
          progress.textContent = candidate.training_count + "回（審査基準未設定）";
        }
        row.appendChild(progress);

        if (!candidate.loaded) {
          const status = document.createElement("div");
          status.className = candidate.load_error ? "error" : "warn";
          status.textContent = candidate.load_error || "登録済み状態を読み込み中…";
          row.appendChild(status);
        }

        const slots = document.createElement("div");
        slots.className = "slots";
        currentSlots.forEach(function (slot) {
          const button = document.createElement("button");
          const selected = candidate.slot_ids.includes(slot.slot_id);
          button.type = "button";
          button.className = "slot" + (selected ? " selected" : "");
          button.textContent = (slot.start_time && slot.end_time) ? slot.start_time + "–" + slot.end_time : slot.label;
          button.disabled = !candidate.loaded || submitting;
          button.onclick = function () { toggleSlot(candidate.member_id, slot.slot_id); };
          slots.appendChild(button);
        });
        row.appendChild(slots);
        container.appendChild(row);
      });
      updateSendButton();
    }

    function sendCandidatesToGas() {
      if (submitting) return;
      if (!currentTeacherId || !currentLocationId || !currentBillingBlockId) {
        addLog("先生・道場・課金枠をすべて設定してください。", "error");
        return;
      }
      if (memberCandidates.length === 0) {
        addLog("出席する会員がいません。", "error");
        return;
      }
      const notLoaded = memberCandidates.filter(function (item) { return !item.loaded; });
      if (notLoaded.length > 0) {
        addLog("登録済み状態を確認できていない会員がいます。誤取消防止のため送信できません。", "error");
        return;
      }
      const rankMissing = memberCandidates.filter(function(item) { return !item.current_rank; });
      if (rankMissing.length > 0) {
        addLog("現在級・段を選択してください: " + rankMissing.map(function(item) { return item.member_id; }).join(", "), "error");
        return;
      }

      const payload = {
        mode: "attendance_batch",
        attendance_session_id: attendanceSessionId,
        attendance_date: currentAttendanceDate(),
        teacher_id: currentTeacherId,
        location_id: currentLocationId,
        billing_block_id: currentBillingBlockId,
        attendance_items: memberCandidates.map(function (item) {
          return {
            member_id: item.member_id,
            current_rank: item.current_rank,
            slot_ids: item.slot_ids.slice()
          };
        }),
        source: "github_pages_qr"
      };

      const expectedByMember = {};
      payload.attendance_items.forEach(function(item) {
        expectedByMember[item.member_id] = {
          slot_ids: item.slot_ids.slice(),
          current_rank: item.current_rank
        };
      });

      submitting = true;
      renderCandidates();
      updateSendButton();
      addLog("出席登録を送信しています。");
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      }).then(function () {
        addLog("同期要求が完了しました。保存結果を再確認します。");
        return refreshAllMemberStates(expectedByMember);
      }).catch(function (error) {
        addLog("送信エラー: " + error, "error");
      }).finally(function() {
        submitting = false;
        renderCandidates();
        updateSendButton();
      });
    }

    function clearCandidates(silent) {
      if (submitting) return;
      memberCandidates = [];
      attendanceSessionId = createSessionId();
      renderCandidates();
      if (!silent) addLog("会員一覧をクリアしました。");
    }

    function renderKeys() {
      setKey("locationId", currentLocationId);
      setKey("billingBlockId", currentBillingBlockId);
      setKey("teacherId", currentTeacherId);
      updateSendButton();
    }

    function setKey(id, value) {
      const element = document.getElementById(id);
      element.textContent = value || "未設定";
      element.className = value ? "ok" : "warn";
    }

    function updateSendButton() {
      document.getElementById("sendButton").disabled = !(
        !submitting && currentTeacherId && currentLocationId && currentBillingBlockId &&
        memberCandidates.length > 0 && memberCandidates.every(function (item) { return item.loaded && item.current_rank; })
      );
    }

    function normalizeSlotIds(slotIds) {
      return Array.from(new Set((slotIds || []).map(function(value) {
        return String(value || "").trim();
      }).filter(Boolean))).sort();
    }

    function sortedCandidates() {
      const mode = document.getElementById("candidateSort").value;
      return memberCandidates.map(function(item, index) { return { item:item, index:index }; }).sort(function(left, right) {
        if (mode === "rank") {
          return rankSortValue(left.item.current_rank) - rankSortValue(right.item.current_rank) || left.index - right.index;
        }
        if (mode === "exam") {
          const leftRemaining = left.item.remaining_training_count === null ? 999999 : left.item.remaining_training_count;
          const rightRemaining = right.item.remaining_training_count === null ? 999999 : right.item.remaining_training_count;
          return leftRemaining - rightRemaining || left.index - right.index;
        }
        return left.index - right.index;
      }).map(function(entry) { return entry.item; });
    }

    function buildRankOptions(select, selectedRank) {
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = "選択してください";
      select.appendChild(empty);
      ["成人", "少年"].forEach(function(system) {
        const group = document.createElement("optgroup");
        group.label = system;
        rankOptions.filter(function(rank) { return rank.qualification_system === system; }).forEach(function(rank) {
          const option = document.createElement("option");
          option.value = rank.display_name;
          option.textContent = rank.display_name;
          option.selected = rank.display_name === selectedRank;
          group.appendChild(option);
        });
        if (group.children.length) select.appendChild(group);
      });
      if (selectedRank && !rankOptions.some(function(rank) { return rank.display_name === selectedRank; })) {
        const legacy = document.createElement("option");
        legacy.value = selectedRank;
        legacy.textContent = selectedRank + "（旧表記・要選択）";
        legacy.selected = true;
        select.appendChild(legacy);
      }
    }

    function rankSortValue(rankName) {
      const rank = rankOptions.find(function(option) { return option.display_name === rankName; });
      return rank ? Number(rank.sort_order || 999999) : 999999;
    }

    function slotIdsEqual(left, right) {
      const normalizedLeft = normalizeSlotIds(left);
      const normalizedRight = normalizeSlotIds(right);
      return normalizedLeft.length === normalizedRight.length &&
        normalizedLeft.every(function(value, index) { return value === normalizedRight[index]; });
    }

    function jsonp(url, params) {
      return new Promise(function (resolve, reject) {
        const callbackName = "attendanceCallback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const script = document.createElement("script");
        const query = new URLSearchParams(Object.assign({}, params, { callback: callbackName }));
        const timeout = window.setTimeout(function () { cleanup(); reject(new Error("稽古枠の取得がタイムアウトしました。")); }, 15000);
        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }
        window[callbackName] = function (data) { cleanup(); resolve(data); };
        script.onerror = function () { cleanup(); reject(new Error("GASへ接続できませんでした。")); };
        script.src = url + "?" + query.toString();
        document.head.appendChild(script);
      });
    }

    function localDateText(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function currentAttendanceDate() {
      const context = window.DOJO_SYSTEM_CONTEXT;
      return context && context.system_now ? String(context.system_now).slice(0, 10) : localDateText(new Date());
    }

    function createSessionId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") return "ASES-" + window.crypto.randomUUID();
      return "ASES-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function addLog(message, className) {
      const li = document.createElement("li");
      li.textContent = "[" + new Date().toLocaleTimeString() + "] " + message;
      if (className) li.className = className;
      document.getElementById("log").prepend(li);
    }

    function beep(frequency) {
      try {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.connect(gain); gain.connect(context.destination);
        oscillator.frequency.value = frequency || 880; gain.gain.value = 0.08;
        oscillator.start(); oscillator.stop(context.currentTime + 0.08);
      } catch (error) {}
      if (navigator.vibrate) navigator.vibrate(100);
    }
  </script>
  <script src="system_context.js"></script>
</body>
</html>
